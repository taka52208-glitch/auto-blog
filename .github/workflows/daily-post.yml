name: 朝の自動記事投稿

on:
  schedule:
    # 朝9時（日本時間）= UTC 0:17（混雑回避で17分にずらす）
    - cron: '17 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "blog-deploy"
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 記事を自動生成
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_article.py

      - name: Hugo セットアップ
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: サイトをビルド
        run: hugo --minify

      - name: 変更をコミット＆プッシュ
        run: |
          git config user.name "Auto Blog Bot"
          git config user.email "bot@example.com"
          git add -A
          git diff --cached --quiet || git commit -m "auto: 記事追加 $(date +%Y-%m-%d-%H%M)"
          git push

      - name: GitHub Pages にデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      - name: Xに自動ポスト
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python scripts/post_to_x.py
