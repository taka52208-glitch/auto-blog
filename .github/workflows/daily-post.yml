name: 毎日自動記事投稿

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日朝9時(JST = UTC+9)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "blog-deploy"
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 記事を自動生成
        timeout-minutes: 10
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_article.py

      - name: 記事が生成されたか確認
        id: check_article
        run: |
          if git diff --name-only | grep -q "^content/posts/"; then
            echo "generated=true" >> "$GITHUB_OUTPUT"
            echo "新しい記事が生成されました"
          else
            echo "generated=false" >> "$GITHUB_OUTPUT"
            echo "記事が品質基準を満たさなかったため、投稿をスキップします"
          fi

      - name: 変更をコミット＆プッシュ
        if: steps.check_article.outputs.generated == 'true'
        run: |
          git config user.name "Auto Blog Bot"
          git config user.email "bot@example.com"
          git add content/posts/
          git diff --cached --quiet || git commit -m "auto: 記事追加 $(date +%Y-%m-%d-%H%M)"
          git push

      - name: Hugo セットアップ（デプロイ用）
        if: steps.check_article.outputs.generated == 'true'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: サイトをビルド
        if: steps.check_article.outputs.generated == 'true'
        run: hugo --minify

      - name: GitHub Pages にデプロイ
        if: steps.check_article.outputs.generated == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      - name: Xに自動ポスト
        if: steps.check_article.outputs.generated == 'true'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python scripts/post_to_x.py
