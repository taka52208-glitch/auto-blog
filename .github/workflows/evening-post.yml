name: 夕方の自動記事投稿

on:
  # 【一時停止中】AdSense再審査が通るまで自動投稿を止めています。
  # 低品質な自動生成記事が増えると「有用性の低いコンテンツ」で再び落ちるため。
  # 再開する場合は下の schedule の2行のコメントを外してください。
  # schedule:
  #   - cron: '43 9 * * *'   # 夕方18時(JST)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "blog-deploy"
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 記事を自動生成
        timeout-minutes: 10
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_article.py

      - name: Hugo セットアップ
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: 旧ビルド成果物をクリーン（stale URL混入防止）
        run: rm -rf public/*

      - name: サイトをビルド
        run: hugo --minify

      - name: 変更をコミット＆プッシュ
        run: |
          git config user.name "Auto Blog Bot"
          git config user.email "bot@example.com"
          git add -A
          git diff --cached --quiet || git commit -m "auto: 記事追加 $(date +%Y-%m-%d-%H%M)"
          git push

      - name: GitHub Pages にデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      - name: Xに自動ポスト
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python scripts/post_to_x.py
